services:
  - type: web
    name: temptagbot-bot
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    # Run a small HTTP health server on $PORT so Render's web service can
    # start successfully, while the Telegram bot runs in the background.
    startCommand: "python -m bot.server"
    autoDeploy: true
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_GROUP_ID
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false

